# Minimal snmpd.conf for integration testing.
# SNMPv3 user "nix" with MD5 auth + AES privacy.

# Listen on all interfaces, port 161
agentAddress udp:161

# Create the SNMPv3 user.
createUser nix MD5 nix1234567 AES nix1234567

# Grant read-only access to the full OID tree.
rouser nix priv

# Enable UCD-SNMP-MIB system stats monitoring.
# ssCpuIdle (.1.3.6.1.4.1.2021.11.11.0) requires systemStats.
# memAvailReal (.1.3.6.1.4.1.2021.4.6.0) requires memory monitoring.
load 12 14 14
includeAllDisks 10%
swap 1024

# Ensure sysLocation/sysContact are set (avoids warnings).
sysLocation    integration-test
sysContact     test@test
